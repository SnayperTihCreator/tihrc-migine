name: Upload tihrc-migine

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Run tests
        run: uv run pytest

  build-sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Build sdist
        run: uv build
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  build-wheels:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: windows-latest
            target: x86_64
          - os: macos-latest
            target: universal2
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Build wheel
        run: uv build
      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist/*.whl

  fix-linux-wheel:
    runs-on: ubuntu-latest
    needs: [build-wheels]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Download Linux wheel
        uses: actions/download-artifact@v4
        with:
          name: wheels-ubuntu-latest
          path: dist/
      - name: Repair wheel with auditwheel
        run: |
          pip install auditwheel
          auditwheel repair dist/*linux_x86_64.whl --plat manylinux_2_17_x86_64 --outdir dist-fixed/
      - name: Upload fixed wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-fixed
          path: dist-fixed/*.whl

  pypi-publish:
    runs-on: ubuntu-latest
    needs: [run-tests, build-sdist, build-wheels, fix-linux-wheel]
    permissions:
      id-token: write
    environment:
      name: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: wheels-windows-latest
          path: dist/
      - uses: actions/download-artifact@v4
        with:
          name: wheels-macos-latest
          path: dist/
      - uses: actions/download-artifact@v4
        with:
          name: wheels-linux-fixed
          path: dist/
      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  github-release:
    runs-on: ubuntu-latest
    needs: [pypi-publish]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: wheels-windows-latest
          path: dist/
      - uses: actions/download-artifact@v4
        with:
          name: wheels-macos-latest
          path: dist/
      - uses: actions/download-artifact@v4
        with:
          name: wheels-linux-fixed
          path: dist/
      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
