name: Upload tihrc-migine

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Run tests
        run: uv run pytest

  build-sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Build sdist
        run: uv build
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  build-wheels-unix:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: universal2
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Build wheel
        run: uv build
      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist/*.whl

  build-wheels-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build manylinux wheels
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64
          args: --release --out dist --find-interpreter
          manylinux: auto
          container: off
      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux
          path: dist/*.whl

  build-wheels-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Build wheel
        run: uv build
      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows
          path: dist/*.whl

  pypi-publish:
    runs-on: ubuntu-latest
    needs: [run-tests, build-sdist, build-wheels-unix, build-wheels-linux, build-wheels-windows]
    permissions:
      id-token: write
    environment:
      name: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: wheels-linux
          path: dist/
      - uses: actions/download-artifact@v4
        with:
          name: wheels-macos-latest
          path: dist/
      - uses: actions/download-artifact@v4
        with:
          name: wheels-windows
          path: dist/
      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  github-release:
    runs-on: ubuntu-latest
    needs: [pypi-publish]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: wheels-linux
          path: dist/
      - uses: actions/download-artifact@v4
        with:
          name: wheels-macos-latest
          path: dist/
      - uses: actions/download-artifact@v4
        with:
          name: wheels-windows
          path: dist/
      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
